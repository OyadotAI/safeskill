steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/safeskill-discovery:latest'
      - '-f'
      - 'apps/discovery-job/Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/safeskill-discovery:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'safeskill-discovery'
      - '--image'
      - 'gcr.io/$PROJECT_ID/safeskill-discovery:latest'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '1Gi'
      - '--task-timeout'
      - '3600s'
      - '--max-retries'
      - '1'
      - '--set-env-vars'
      - 'GCS_BUCKET=safeskill-scans,GCP_PROJECT=$PROJECT_ID,SCANNER_URL=https://safeskill-scanner-522063586383.us-central1.run.app,SCAN_CONCURRENCY=5'
      - '--update-secrets'
      - 'GITHUB_TOKEN=safeskill-github-token:latest'
images:
  - 'gcr.io/$PROJECT_ID/safeskill-discovery:latest'
