steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/safeskill-scanner:latest'
      - '-f'
      - 'apps/scanner-worker/Dockerfile'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/safeskill-scanner:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'safeskill-scanner'
      - '--image'
      - 'gcr.io/$PROJECT_ID/safeskill-scanner:latest'
      - '--region'
      - 'us-central1'
      - '--memory'
      - '2Gi'
      - '--timeout'
      - '180s'
      - '--concurrency'
      - '1'
      - '--max-instances'
      - '100'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCS_BUCKET=safeskill-scans,GCP_PROJECT=$PROJECT_ID'
      - '--update-secrets'
      - 'GITHUB_TOKEN=safeskill-github-token:latest'
images:
  - 'gcr.io/$PROJECT_ID/safeskill-scanner:latest'
